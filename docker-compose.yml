services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-tournament-db
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/sql:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    networks:
      - sports-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ${DB_NAME:?DB_NAME is required}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports-tournament-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MASTER_USERNAME: ${MASTER_USERNAME:?MASTER_USERNAME is required}
      MASTER_EMAIL: ${MASTER_EMAIL:?MASTER_EMAIL is required}
      MASTER_PASSWORD: ${MASTER_PASSWORD:?MASTER_PASSWORD is required}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms512m}
    ports:
      - "9000:8080"
    networks:
      - sports-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_VITE_API_BASE_URL:?FRONTEND_VITE_API_BASE_URL is required}
    container_name: sports-tournament-frontend
    depends_on:
      - app
    ports:
      - "5080:80"
    networks:
      - sports-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  sports-network:
    driver: bridge
