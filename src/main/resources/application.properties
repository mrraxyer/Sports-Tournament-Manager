spring.application.name=SportsTournamentManager

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:deportivos}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/database.sql

# ===================================
# Initialization Configuration
# ===================================
app.init.enabled=true
app.init.master-username=${MASTER_USERNAME}
app.init.master-email=${MASTER_EMAIL}
app.init.master-password=${MASTER_PASSWORD}

# ===================================
# CORS Configuration
# ===================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
